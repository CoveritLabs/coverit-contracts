syntax = "proto3";

package coverit.project.v1;

message ProjectDashboardVersionRef {
  string id = 1;
  string version = 2;
  string application_id = 3;
  string application_name = 4;
}

message ProjectCoverageSummary {
  double percentage = 1;
  int32 covered_transitions = 2;
  int32 total_transitions = 3;
  optional string crawl_session_id = 4;
  optional string calculated_at = 5;
}

message ProjectRunStatistics {
  int32 passed_count = 1;
  int32 warning_count = 2;
  int32 failed_count = 3;
  int32 reported_warning_count = 4;
  int32 reported_failed_count = 5;
  int32 total_runs = 6;
}

message ProjectLatestRun {
  string id = 1;
  string run_id = 2;
  string display_name = 3;
  string status = 4;
  string application_id = 5;
  string application_name = 6;
  optional string version_id = 7;
  optional string version = 8;
  int32 passed_count = 9;
  int32 warning_count = 10;
  int32 failed_count = 11;
  string created_at = 12;
}

message ProjectLatestCrawlSession {
  string id = 1;
  string status = 2;
  string trigger_type = 3;
  string application_id = 4;
  string application_name = 5;
  string version_id = 6;
  string version = 7;
  int32 state_count = 8;
  int32 transition_count = 9;
  string created_at = 10;
  optional string started_at = 11;
  optional string finished_at = 12;
}

message ProjectLatestTestFlow {
  string id = 1;
  string crawl_session_id = 2;
  string application_id = 3;
  string application_name = 4;
  string version_id = 5;
  string version = 6;
  string checkpoint_state_hash = 7;
  string checkpoint_url = 8;
  bool is_clipped = 9;
  int32 step_count = 10;
  string created_at = 11;
}

message ProjectActivity {
  string id = 1;
  string project_id = 2;
  string event_type = 3;
  string entity_type = 4;
  optional string entity_id = 5;
  string message = 6;
  optional string actor_user_id = 7;
  optional string actor_name = 8;
  optional string actor_email = 9;
  string created_at = 10;
}

message ProjectDashboardResponse {
  optional ProjectDashboardVersionRef selected_version = 1;
  ProjectCoverageSummary coverage = 2;
  ProjectRunStatistics run_statistics = 3;
  repeated ProjectLatestRun latest_runs = 4;
  repeated ProjectLatestCrawlSession latest_crawl_sessions = 5;
  repeated ProjectLatestTestFlow latest_test_flows = 6;
  repeated ProjectActivity recent_activities = 7;
}
