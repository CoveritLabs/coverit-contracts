syntax = "proto3";

package coverit.project.v1;

message ProjectDashboardTotals {
  int32 total_states = 1;
  int32 total_transitions = 2;
  int32 total_on_demand_sessions = 3;
  int32 total_runs = 4;
  int32 passed_count = 5;
  int32 warning_count = 6;
  int32 failed_count = 7;
  int32 reported_warning_count = 8;
  int32 reported_failed_count = 9;
}

message ProjectCoveragePoint {
  string application_id = 1;
  string application_name = 2;
  string version_id = 3;
  string version = 4;
  double percentage = 5;
  int32 covered_transitions = 6;
  int32 total_transitions = 7;
  int32 total_states = 8;
  int32 session_count = 9;
  optional string calculated_at = 10;
}

message ProjectRunTrendPoint {
  string id = 1;
  string run_id = 2;
  string display_name = 3;
  string status = 4;
  string application_id = 5;
  string application_name = 6;
  optional string version_id = 7;
  optional string version = 8;
  int32 passed_count = 9;
  int32 warning_count = 10;
  int32 failed_count = 11;
  optional int32 duration_ms = 12;
  string created_at = 13;
}

message ProjectCrawlSessionTrendPoint {
  string id = 1;
  string application_id = 2;
  string application_name = 3;
  string version_id = 4;
  string version = 5;
  int32 state_count = 6;
  int32 transition_count = 7;
  string created_at = 8;
  optional string finished_at = 9;
}

message ProjectTestFlowBreakdownPoint {
  string type = 1;
  int32 count = 2;
  int32 total_steps = 3;
  int32 generated_count = 4;
  int32 stale_count = 5;
  int32 pending_count = 6;
}

message ProjectActivity {
  string id = 1;
  string project_id = 2;
  string event_type = 3;
  string entity_type = 4;
  optional string entity_id = 5;
  string message = 6;
  optional string actor_user_id = 7;
  optional string actor_name = 8;
  optional string actor_email = 9;
  string created_at = 10;
}

message ProjectDashboardResponse {
  ProjectDashboardTotals totals = 1;
  repeated ProjectCoveragePoint coverage_by_application = 2;
  repeated ProjectCoveragePoint coverage_by_version = 3;
  repeated ProjectRunTrendPoint run_trend = 4;
  repeated ProjectCrawlSessionTrendPoint crawl_session_trend = 5;
  repeated ProjectTestFlowBreakdownPoint test_flow_breakdown = 6;
  repeated ProjectActivity recent_activities = 7;
}
