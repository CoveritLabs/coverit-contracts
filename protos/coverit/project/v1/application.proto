syntax = "proto3";

package coverit.project.v1;

import "validate/validate.proto";

///////////////
// Request DTOs
///////////////

message CreateTargetApplicationRequest {
  string name = 1 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 100
  ];

  string base_url = 2 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 200
  ];
}

message UpdateTargetApplicationRequest {
  optional string name = 1 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 100
  ];

  optional string base_url = 2 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 200
  ];
}

message CreateTargetApplicationVersionRequest {
  string version = 1 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 50
  ];
}

message CreateRegressionCodebaseRequest {
  string framework_name = 1 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 50
  ];

  string repository_url = 2 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 200
  ];

  optional string api_key = 3 [
    (validate.rules).string.max_len = 200
  ];
}

message UpdateRegressionCodebaseRequest {
  optional string framework_name = 1 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 50
  ];

  optional string repository_url = 2 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 200
  ];

  optional string api_key = 3 [
    (validate.rules).string.max_len = 200
  ];
}

////////////////
// Response DTOs
////////////////

message CreateTargetApplicationResponse {
  string id = 1;
  optional string api_key = 2;
  optional string api_key_preview = 3;
}

message TargetApplicationResponse {
  string id = 1;
  string name = 2;
  string base_url = 3;
  repeated TargetApplicationVersionResponse versions = 4;
  optional string api_key_preview = 5;
  optional string api_key_created_at = 6;
  optional string api_key_rotated_at = 7;
}

message TargetApplicationVersionResponse {
  string id = 1;
  string version = 2;
}

message RegressionCodebaseResponse {
  string id = 1;
  string framework_name = 2;
  string repository_url = 3;
}

message RotateTargetApplicationApiKeyResponse {
  string api_key = 1;
  string api_key_preview = 2;
}
