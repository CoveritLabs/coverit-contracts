  optional CrawlScheduleMode mode = 2 [
    (validate.rules).enum.defined_only = true
  ];

  optional string version_id = 3 [
    (validate.rules).string.uuid = true
  ];

  optional string cron = 4 [
    (validate.rules).string.max_len = 200
  ];

  optional string timezone = 5 [
    (validate.rules).string.max_len = 100
  ];

  optional string run_at = 6 [
    (validate.rules).string.max_len = 40
  ];

  optional bool is_active = 7;
  optional bool catch_up = 8;

  optional CrawlConfig crawl_config = 9;
  optional CodegenConfig codegen_config = 10;

  optional string regression_codebase_id = 11 [
    (validate.rules).string.uuid = true
