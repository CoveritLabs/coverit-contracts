    (validate.rules).int32.lte = 86400000
  ];

  optional bool use_dom_quiescence = 13;

  optional string page_load_state = 14 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 100
  ];

  optional bool click_non_http_links = 15;
  optional bool defer_destructive_actions = 16;

  optional string destructive_keywords = 17 [
    (validate.rules).string.max_len = 5000
  ];

  optional bool use_semantic_diversity = 18;

  optional double semantic_diversity_threshold = 19 [
    (validate.rules).double.gte = 0,
    (validate.rules).double.lte = 1
  ];

  optional double semantic_uncertainty_margin = 20 [
    (validate.rules).double.gte = 0,
    (validate.rules).double.lte = 1
  ];

  optional int32 semantic_max_bank_size = 21 [
    (validate.rules).int32.gte = 1,
    (validate.rules).int32.lte = 1000000
  ];

  optional string semantic_artifact_dir = 22 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 2000
  ];
}

message InputDefaultsConfig {
  map<string, string> field_patterns = 1;
  map<string, string> type_fallbacks = 2;
}

message TestFlowGenerationConfig {
  optional double coverage_percentage = 1 [
    (validate.rules).double.gte = 0,
    (validate.rules).double.lte = 100
  ];

  optional int32 num_of_tf = 2 [
    (validate.rules).int32.gte = 1
  ];

  optional int32 num_of_states = 3 [
    (validate.rules).int32.gte = 1,
    (validate.rules).int32.lte = 100000
  ];

  optional int32 min_num_of_states_per_tf = 4 [
    (validate.rules).int32.gte = 1,
    (validate.rules).int32.lte = 100000
  ];
}

message CrawlConfig {
  reserved 2, 3, 4, 5;
  reserved "max_depth", "include_url_patterns", "exclude_url_patterns", "enable_semantic_decisions";

  optional int32 max_states = 1 [
    (validate.rules).int32.gte = 1,
    (validate.rules).int32.lte = 100000
  ];

  optional int32 timeout_seconds = 6 [
    (validate.rules).int32.gte = 1,
    (validate.rules).int32.lte = 86400
  ];

  CrawlerRunSettings crawler_settings = 7;
  InputDefaultsConfig input_defaults = 8;
  optional bool generate_test_flows = 9;
  TestFlowGenerationConfig test_flow_generation = 10;
}

message CodegenConfig {
  string codegen_branch = 1 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 200
  ];

  string pr_target_branch = 2 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 200
  ];

  optional string pr_title = 3 [
    (validate.rules).string.max_len = 200
  ];

  optional string pr_body = 4 [
    (validate.rules).string.max_len = 5000
  ];

  optional bool pr_draft = 5;
}

message ManualRecordingConnectResponse {
  string session_id = 1 [
    (validate.rules).string.uuid = true
  ];

  string ws_ticket = 2 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 200
  ];
}

message ManualSessionSocketMessage {
  ManualSessionSocketMessageType type = 1 [
    (validate.rules).enum.defined_only = true
  ];

  optional ManualSessionStatus status = 2 [
    (validate.rules).enum.defined_only = true
  ];

  optional ManualSessionDisconnectReason reason = 3 [
    (validate.rules).enum.defined_only = true
  ];

  optional string message = 4 [
    (validate.rules).string.max_len = 2000
  ];

  optional google.protobuf.Value payload = 5;
}

enum TestFlowType {
  TEST_FLOW_TYPE_UNSPECIFIED = 0;
  TEST_FLOW_TYPE_MANUAL = 1;
  TEST_FLOW_TYPE_BUG_REPRODUCTION = 2;
  TEST_FLOW_TYPE_COVERAGE = 3;
}

message ManualSessionRecordedEvent {
  string id = 1 [
    (validate.rules).string.max_len = 100
  ];

  string timestamp = 2 [
    (validate.rules).string.max_len = 40
  ];

  string action = 3 [
    (validate.rules).string.min_len = 1,
    (validate.rules).string.max_len = 100
  ];

  optional string selector = 4 [
    (validate.rules).string.max_len = 2000
  ];

  optional string value = 5 [
    (validate.rules).string.max_len = 2000
  ];

  optional string page_url = 6 [
    (validate.rules).string.max_len = 2048
  ];

  optional string accessible_name = 7 [
    (validate.rules).string.max_len = 200
  ];
}

