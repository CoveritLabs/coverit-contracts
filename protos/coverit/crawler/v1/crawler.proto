syntax = "proto3";

package coverit.crawler.v1;

import "validate/validate.proto";

///////////////
// Enums
///////////////
//TODO:  i think we should add new, and paused status.
enum CrawlStatus {
  CRAWL_STATUS_UNSPECIFIED = 0;
  CRAWL_STATUS_QUEUED = 1;
  CRAWL_STATUS_RUNNING = 2;
  CRAWL_STATUS_COMPLETED = 3;
  CRAWL_STATUS_FAILED = 4;
  CRAWL_STATUS_ABORTED = 5;
  CRAWL_STATUS_PAUSED = 6;
  CRAWL_STATUS_NEW = 7;
}

enum CrawlTriggerType {
  CRAWL_TRIGGER_TYPE_UNSPECIFIED = 0;
  CRAWL_TRIGGER_TYPE_MANUAL = 1;
  CRAWL_TRIGGER_TYPE_SCHEDULED = 2;
  CRAWL_TRIGGER_TYPE_CI_TRIGGER = 3;
  CRAWL_TRIGGER_TYPE_WEBHOOK = 4;
}

///////////////
// Messages
///////////////

message CrawlConfig {
  int32 max_states = 1 [
    (validate.rules).int32.gte = 1,
    (validate.rules).int32.lte = 100000
  ];

  int32 max_depth = 2 [
    (validate.rules).int32.gte = 1,
    (validate.rules).int32.lte = 1000
  ];

  repeated string include_url_patterns = 3 [
    (validate.rules).repeated.max_items = 100,
    (validate.rules).repeated.items.string.min_len = 1,
    (validate.rules).repeated.items.string.max_len = 2048
  ];

  repeated string exclude_url_patterns = 4 [
    (validate.rules).repeated.max_items = 100,
    (validate.rules).repeated.items.string.min_len = 1,
    (validate.rules).repeated.items.string.max_len = 2048
  ];

  bool enable_semantic_decisions = 5;
  bool headless = 6;

  int32 timeout_seconds = 7 [
    (validate.rules).int32.gte = 1,
    (validate.rules).int32.lte = 86400
  ];
}

message CrawlSessionData {
  string id = 1 [
    (validate.rules).string.uuid = true
  ];

  string app_version_id = 2 [
    (validate.rules).string.uuid = true
  ];

  CrawlStatus status = 3;

  CrawlTriggerType trigger_type = 4 [
    (validate.rules).enum.defined_only = true
  ];

  CrawlConfig crawl_config = 5;

  int32 state_count = 6 [
    (validate.rules).int32.gte = 0
  ];

  int32 transition_count = 7 [
    (validate.rules).int32.gte = 0
  ];

  string created_at = 8 [
    (validate.rules).string.max_len = 40
  ];

  optional string started_at = 9 [
    (validate.rules).string.max_len = 40
  ];

  optional string finished_at = 10 [
    (validate.rules).string.max_len = 40
  ];

  optional string error_message = 11 [
    (validate.rules).string.max_len = 1024
  ];
}


// Request Messages
message CreateCrawlSessionRequest {
  CrawlTriggerType trigger_type = 1 [
    (validate.rules).enum.defined_only = true
  ];
  CrawlConfig crawl_config = 2;
}


// Response Messages
message ApplicationVersionCrawlSessionsResponse {
  repeated CrawlSessionData sessions = 1;

  int32 total_count = 2 [
    (validate.rules).int32.gte = 0
  ];

  int32 current_page = 3 [
    (validate.rules).int32.gte = 1
  ];

  int32 page_size = 4 [
    (validate.rules).int32.gte = 1,
    (validate.rules).int32.lte = 100
  ];
}

message CrawlSessionByIDResponse {
  CrawlSessionData session = 1;
}
message StopCrawlSessionResponse {
  CrawlSessionData session = 1;
}