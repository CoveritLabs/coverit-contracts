syntax = "proto3";

package coverit.crawler.v1;

import "google/protobuf/struct.proto";
import "validate/validate.proto";

///////////////
// Enums
///////////////

enum CrawlStatus {
  CRAWL_STATUS_UNSPECIFIED = 0;
  CRAWL_STATUS_QUEUED = 1;
  CRAWL_STATUS_RUNNING = 2;
  CRAWL_STATUS_COMPLETED = 3;
  CRAWL_STATUS_FAILED = 4;
  CRAWL_STATUS_ABORTED = 5;
  CRAWL_STATUS_PAUSED = 6;
  CRAWL_STATUS_NEW = 7;
}

enum CrawlTriggerType {
  CRAWL_TRIGGER_TYPE_UNSPECIFIED = 0;
  CRAWL_TRIGGER_TYPE_MANUAL = 1;
  CRAWL_TRIGGER_TYPE_SCHEDULED = 2;
  CRAWL_TRIGGER_TYPE_CI_TRIGGER = 3;
  CRAWL_TRIGGER_TYPE_WEBHOOK = 4;
  CRAWL_TRIGGER_TYPE_ON_DEMAND = 5;
}

enum CrawlScheduleType {
  CRAWL_SCHEDULE_TYPE_UNSPECIFIED = 0;
  CRAWL_SCHEDULE_TYPE_ONCE = 1;
  CRAWL_SCHEDULE_TYPE_CRON = 2;
}

enum CrawlScheduleMode {
  CRAWL_SCHEDULE_MODE_UNSPECIFIED = 0;
  CRAWL_SCHEDULE_MODE_LATEST_VERSION = 1;
  CRAWL_SCHEDULE_MODE_FIXED_VERSION = 2;
}

enum ManualSessionSocketMessageType {
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_UNSPECIFIED = 0;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_BROWSER_INPUT = 1;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_FLOW_START = 2;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_SESSION_DISCONNECT = 3;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_CRAWLER_READY = 4;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_SESSION_STATUS = 5;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_BROWSER_FRAME = 6;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_BROWSER_NAVIGATION = 7;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_RECORDED_EVENT = 8;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_FLOW_STARTED = 9;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_SESSION_CLOSED = 10;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_ERROR = 11;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_FLOW_FINISH = 12;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_FLOW_COMPLETED = 13;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_BUG_REPORT = 14;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_BUG_REPORTED = 15;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_FLOW_REWIND = 16;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_FLOW_REWOUND = 17;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_RECORDED_STEP = 18;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_CHECKPOINT_REACHED = 19;
  MANUAL_SESSION_SOCKET_MESSAGE_TYPE_SESSION_TTL = 20;
}

enum ManualSessionStatus {
  MANUAL_SESSION_STATUS_UNSPECIFIED = 0;
  MANUAL_SESSION_STATUS_FRONTEND_CONNECTED = 1;
  MANUAL_SESSION_STATUS_CRAWLER_CONNECTED = 2;
  MANUAL_SESSION_STATUS_DISCONNECT_PENDING = 3;
  MANUAL_SESSION_STATUS_CRAWLER_DISCONNECTED = 4;
}

enum ManualSessionDisconnectReason {
  MANUAL_SESSION_DISCONNECT_REASON_UNSPECIFIED = 0;
  MANUAL_SESSION_DISCONNECT_REASON_FRONTEND_DISCONNECTED = 1;
  MANUAL_SESSION_DISCONNECT_REASON_FRONTEND_DISCONNECTED_BEFORE_READY = 2;
}

///////////////
// Messages
///////////////

