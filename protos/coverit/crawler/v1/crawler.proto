  optional int32 max_states = 3 [
    (validate.rules).int32.gte = 1,
    (validate.rules).int32.lte = 100000
  ];

  optional int32 max_transitions = 4 [
    (validate.rules).int32.gte = 1,
    (validate.rules).int32.lte = 1000000
  ];

  optional int32 max_elements_per_state = 5 [
    (validate.rules).int32.gte = 1,
    (validate.rules).int32.lte = 10000
  ];

  optional int32 max_select_options_per_element = 6 [
    (validate.rules).int32.gte = 1,
    (validate.rules).int32.lte = 1000
  ];

  optional int32 max_action_repeats_per_url = 7 [
