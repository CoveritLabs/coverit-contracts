syntax = "proto3";

package coverit.common;

// Shared public-facing DTOs reusable across domains.

message UserInfo {
  string id = 1;
  string email = 2;
  string name = 3;
}

message TokenPair {
  string access_token = 1;
  string refresh_token = 2;
}

// Generic message response
message MessageResponse {
  string message = 1;
}

// Generic error response
message ErrorResponse {
  string error = 1;
  string message = 2;
  int32 status_code = 3;
}
