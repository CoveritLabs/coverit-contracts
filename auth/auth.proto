syntax = "proto3";

package coverit.auth;

import "common/types.proto";

///////////////
// Request DTOs
///////////////

message SignupRequest {
  string email = 1;
  string password = 2;
  string name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message ForgotPasswordRequest {
  string email = 1;
}

message ResetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

////////////////
// Response DTOs
////////////////

message SignupResponse {
  string message = 1;
}

message LoginResponse {
  coverit.common.UserInfo user = 1;
  coverit.common.TokenPair tokens = 2;
}

message RefreshResponse {
  string message = 1;
  coverit.common.TokenPair tokens = 2;
}

message LogoutResponse {
  string message = 1;
}

message ForgotPasswordResponse {
  string message = 1;
}

message ResetPasswordResponse {
  string message = 1;
}

////////
// Error
////////

message ErrorResponse {
  string message = 1;
}
