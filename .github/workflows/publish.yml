name: Publish to GitHub Packages

on:
  push:
    branches: [main, develop]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - run: npm ci --ignore-scripts

      - run: npx buf dep update

      - run: npm run build

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: python -m pip install --upgrade pip build twine

      - name: Sync Python package version
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          version = json.loads(Path('package.json').read_text())['version']
          version_path = Path('python/coverit_contracts/_version.py')
          version_path.parent.mkdir(parents=True, exist_ok=True)
          version_path.write_text(f"__version__ = \"{version}\"\n")
          print(f"Set python version to {version}")
          PY

      - name: Generate Python alias package
        run: |
          python - <<'PY'
          from pathlib import Path

          alias_root = Path("python/contracts")
          source_root = Path("python/coverit")

          def write_init(path: Path, text: str) -> None:
            path.parent.mkdir(parents=True, exist_ok=True)
            path.write_text(text)

          write_init(
            alias_root / "__init__.py",
            "\"\"\"Alias package for protobuf-generated modules.\"\"\"\nfrom coverit_contracts._version import __version__\n",
          )

          init_text = "\"\"\"protobuf alias package.\"\"\"\n"

          if source_root.exists():
            for source in source_root.rglob("*_pb2.py"):
              relative = source.relative_to(source_root)
              destination = alias_root / relative

              for parent in destination.parents:
                if parent == alias_root.parent:
                  break
                write_init(parent / "__init__.py", init_text)

              module_name = "coverit." + ".".join(relative.with_suffix("").parts)
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_text(f"from {module_name} import *\n")
          PY

      - name: Build Python package
        run: python -m build --outdir dist-py

      - name: Get latest release tag
        id: get_tag
        run: |
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish Python package to GitHub Pages PyPI index
        if: github.ref == 'refs/heads/main'
        run: |
          pip install dumb-pypi

          # Clone gh-pages branch, or create it fresh if it doesn't exist yet
          git clone --branch gh-pages --single-branch \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            gh-pages-dir || \
            (mkdir gh-pages-dir && cd gh-pages-dir && git init && \
             git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git)

          # Copy new packages in
          mkdir -p gh-pages-dir/packages
          cp dist-py/* gh-pages-dir/packages/

          # Regenerate the index (ls -1 gives filenames; dumb-pypi needs just names, not paths)
          ls -1 gh-pages-dir/packages/ > /tmp/package-list.txt
          dumb-pypi \
            --package-list /tmp/package-list.txt \
            --packages-url "../../packages" \
            --output-dir gh-pages-dir/simple

          # Push
          cd gh-pages-dir
          git config user.email "ci@coveritlabs.com"
          git config user.name "CI"
          git add -A
          git commit -m "chore: publish python ${{ steps.get_tag.outputs.tag }}" || echo "Nothing to commit"
          git push origin HEAD:gh-pages --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Python wheel to GitHub Release
        if: github.ref == 'refs/heads/main'
        run: |
          gh release upload ${{ steps.get_tag.outputs.tag }} dist-py/*.whl dist-py/*.tar.gz --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
